services:
  bagents:
    build:
      context: .
      args:
        - PROJECT_LANG=${PROJECT_LANG:-rust}
    container_name: bagents-factory
    env_file:
      - .env
    environment:
      - WORKSPACE_DIR=/workspace
    volumes:
      - ${WORKSPACE_DIR:-./target_repo}:/workspace
      - ~/.ssh:/root/.ssh:ro
    tty: true
